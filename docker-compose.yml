services:
  portfolio:
    build:
      context: .
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: jpglabs-portfolio
    restart: always
    ports:
      - "${PORTFOLIO_LOCAL_PORT:-8082}:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`jpglabs.com.br`) || Host(`www.jpglabs.com.br`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"

networks:
  default:
    external: true
    name: traefik_net
