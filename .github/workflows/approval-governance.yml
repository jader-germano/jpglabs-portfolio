name: Approval Governance

on:
  pull_request:
    branches:
      - release
      - stage
      - master
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

concurrency:
  group: portfolio-frontend-approval-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  approval-gate:
    uses: jader-germano/repo-standards/.github/workflows/approval-governance.yml@develop
