name: Approval Governance

on:
  pull_request:
    branches:
      - release
      - stage
      - master
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
  pull_request_review:
    types:
      - submitted
      - dismissed

concurrency:
  group: portfolio-frontend-approval-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  approval-gate:
    name: Lane approval gate
    runs-on: ubuntu-latest

    steps:
      - name: Validate approval policy
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const baseRef = pr.base.ref;
            const canonical = (ref) => {
              if (ref === "main") return "master";
              if (ref === "stage") return "release";
              return ref;
            };
            const base = canonical(baseRef);
            const author = pr.user.login;
            const rootAdmins = new Set(["jader-germano"]);

            if (!["release", "master"].includes(base)) {
              core.notice(`Skipping approval gate for unsupported base branch: ${baseRef}`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login, review);
            }

            const approvals = [...latestByUser.values()].filter(
              (review) => review.state === "APPROVED" && review.user.login !== author
            );

            const rootAdminApprovals = approvals.filter((review) =>
              rootAdmins.has(review.user.login)
            );

            if (base === "release" && approvals.length === 0) {
              core.setFailed(
                "Promotion into release requires at least one non-author approval after the triad verdict."
              );
            }

            if (base === "master" && rootAdminApprovals.length === 0) {
              core.setFailed(
                "Promotion into master requires a non-author ROOT_ADMIN approval."
              );
            }

            await core.summary
              .addHeading("Approval policy")
              .addTable([
                [
                  { data: "Base", header: true },
                  { data: "Author", header: true },
                  { data: "Approvals", header: true },
                  { data: "ROOT_ADMIN approvals", header: true },
                ],
                [
                  baseRef,
                  author,
                  String(approvals.length),
                  String(rootAdminApprovals.length),
                ],
              ])
              .write();
