name: Deploy Portfolio Frontend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/release-publication.yml"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "docker-compose.yml"
      - "eslint.config.js"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "src/**"
      - "public/**"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: portfolio-frontend-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  VITE_PI_SERVICE_BASE_URL: /pi
  VITE_PI_SERVICE_STG_URL: https://stg.jpglabs.com.br/pi
  VITE_PI_SERVICE_PROD_URL: https://jpglabs.com.br/pi
  PORTFOLIO_HOME_URL: https://jpglabs.com.br/
  PORTFOLIO_OFFER_URL: https://jpglabs.com.br/offer
  PORTFOLIO_CANONICAL_URL: https://jpglabs.com.br/portifolio/jader-germano
  PI_SERVICE_PROD_URL: https://jpglabs.com.br/pi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: VITE_BASE_PATH=/ npm run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-frontend-dist
          path: dist
          if-no-files-found: error

      - name: Prepare VPS target
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p /var/www/jpglabs-portfolio/current
            find /var/www/jpglabs-portfolio/current -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Copy static bundle to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: "/var/www/jpglabs-portfolio/current"
          strip_components: 1

      - name: Reload Nginx and smoke test
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            chown -R www-data:www-data /var/www/jpglabs-portfolio/current
            nginx -t
            systemctl reload nginx
            curl -sfI '${{ env.PORTFOLIO_HOME_URL }}' >/dev/null
            curl -sfI '${{ env.PORTFOLIO_OFFER_URL }}' >/dev/null
            curl -sfI '${{ env.PORTFOLIO_CANONICAL_URL }}' >/dev/null
            curl -sf '${{ env.PI_SERVICE_PROD_URL }}/health' >/dev/null
            curl -sf '${{ env.PI_SERVICE_PROD_URL }}/system/overview' >/dev/null
