name: Validate Portfolio Frontend

on:
  pull_request:
    branches:
      - develop
      - release
      - stage
      - master
      - main
  push:
    branches:
      - develop
      - release
      - stage
      - master
      - main
  workflow_dispatch:

concurrency:
  group: portfolio-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-governance:
    if: github.event_name == 'pull_request'
    uses: jader-germano/repo-standards/.github/workflows/pr-governance.yml@develop

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pr-governance]
    if: always() && (needs.pr-governance.result == 'success' || needs.pr-governance.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ] || [ "${GITHUB_BASE_REF}" = "master" ] || [ "${GITHUB_BASE_REF}" = "main" ]; then
            npm run build:prod
          elif [ "${GITHUB_REF_NAME}" = "release" ] || [ "${GITHUB_REF_NAME}" = "stage" ] || [ "${GITHUB_BASE_REF}" = "release" ] || [ "${GITHUB_BASE_REF}" = "stage" ]; then
            npm run build:stage
          else
            npm run build
          fi
