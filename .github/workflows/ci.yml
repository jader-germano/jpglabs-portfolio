name: Validate Portfolio Frontend

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: portfolio-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VITE_PI_SERVICE_BASE_URL: /pi
  VITE_PI_SERVICE_STG_URL: https://stg.jpglabs.com.br/pi
  VITE_PI_SERVICE_PROD_URL: https://jpglabs.com.br/pi

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
